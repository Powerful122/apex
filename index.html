<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arbitrage Calculator (HFT)</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&amp;family=Space+Mono:wght@400;700&amp;display=swap" rel="stylesheet">
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #0f172a; }
    .mono { font-family: 'Space Mono', monospace; }
    @keyframes flashUp { 0% { color:#34d399; } 100% { color:inherit; } }
    @keyframes flashDown { 0% { color:#f87171; } 100% { color:inherit; } }
    .flash-up { animation: flashUp 0.9s ease-out; }
    .flash-down { animation: flashDown 0.9s ease-out; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px);} to {opacity:1; transform:translateY(0);} }
    .reveal { animation: fadeUp 0.6s ease-out both; }
    .pulse-dot { animation: pulse 1.6s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
    input:focus-visible, button:focus-visible { outline: 2px solid #38bdf8; outline-offset: 2px; }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type="number"] {
      -moz-appearance: textfield;
    }
  </style>
</head>
<body class="min-h-screen w-full text-slate-100">
  <!-- Header -->
  <header class="w-full px-6 pt-8 pb-4 max-w-5xl mx-auto reveal">
    <div class="flex items-center gap-3 flex-wrap">
      <h1 class="font-bold text-2xl">⚖️ Arbitrage Calculator</h1>
      <span class="px-2.5 py-1 rounded-md text-xs font-bold tracking-wide bg-emerald-500/20 text-emerald-300">DEMO</span>
    </div>
    <p class="mt-2 text-slate-400">Transactions by HFT engines.</p>
  </header>

  <!-- Live ticker -->
  <section class="w-full max-w-5xl mx-auto px-6">
    <div class="flex items-center gap-2 mb-2">
      <span class="pulse-dot inline-block w-2 h-2 rounded-full bg-emerald-400"></span>
      <span class="text-xs uppercase tracking-widest text-slate-400">Live Prices</span>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
      <div class="rounded-xl p-4 border border-white/5 bg-slate-900/50">
        <div class="flex items-center justify-between">
          <span class="font-medium">Bitcoin</span>
          <span class="mono text-xs px-1.5 py-0.5 rounded" id="btc-change">—</span>
        </div>
        <div class="mono text-2xl mt-1 font-bold" id="btc-price">Loading…</div>
      </div>
      <div class="rounded-xl p-4 border border-white/5 bg-slate-900/50">
        <div class="flex items-center justify-between">
          <span class="font-medium">Ethereum</span>
          <span class="mono text-xs px-1.5 py-0.5 rounded" id="eth-change">—</span>
        </div>
        <div class="mono text-2xl mt-1 font-bold" id="eth-price">Loading…</div>
      </div>
      <div class="rounded-xl p-4 border border-white/5 bg-slate-900/50">
        <div class="flex items-center justify-between">
          <span class="font-medium">BNB</span>
          <span class="mono text-xs px-1.5 py-0.5 rounded" id="bnb-change">—</span>
        </div>
        <div class="mono text-2xl mt-1 font-bold" id="bnb-price">Loading…</div>
      </div>
    </div>
    <p id="ticker-status" class="text-xs text-slate-500 mt-2 mono hidden"></p>
  </section>

  <!-- Main Content -->
  <main class="w-full max-w-5xl mx-auto px-6 py-6 grid lg:grid-cols-2 gap-6">
    <!-- Inputs Panel -->
    <form id="arb-form" class="rounded-2xl p-6 border border-white/5 bg-slate-900/50 reveal" style="animation-delay:.1s">
      <h2 class="font-bold mb-4 text-lg">Trade Parameters</h2>
      
      <div class="mb-4">
        <label for="pair-input" class="block text-sm mb-1 text-slate-300">Trading Pair</label>
        <input id="pair-input" type="text" value="BTC/USDT" class="w-full rounded-lg bg-slate-800/70 border border-white/10 px-3 py-2 text-slate-100 mono">
      </div>

      <div class="grid grid-cols-2 gap-3 mb-4">
        <div>
          <label for="platform-a-input" class="block text-sm mb-1 text-slate-300">Platform A</label>
          <input id="platform-a-input" type="text" value="Binance" class="w-full rounded-lg bg-slate-800/70 border border-white/10 px-3 py-2 text-slate-100">
        </div>
        <div>
          <label for="platform-b-input" class="block text-sm mb-1 text-slate-300">Platform B</label>
          <input id="platform-b-input" type="text" value="Kraken" class="w-full rounded-lg bg-slate-800/70 border border-white/10 px-3 py-2 text-slate-100">
        </div>
      </div>

      <div class="grid grid-cols-2 gap-3 mb-4">
        <div>
          <label for="price-a-input" class="block text-sm mb-1 text-slate-300">Price A (Platform A)</label>
          <input id="price-a-input" type="number" step="any" value="64200" class="w-full rounded-lg bg-slate-800/70 border border-white/10 px-3 py-2 text-slate-100 mono">
        </div>
        <div>
          <label for="price-b-input" class="block text-sm mb-1 text-slate-300">Price B (Platform B)</label>
          <input id="price-b-input" type="number" step="any" value="64350" class="w-full rounded-lg bg-slate-800/70 border border-white/10 px-3 py-2 text-slate-100 mono">
        </div>
      </div>

      <div class="grid grid-cols-2 gap-3 mb-4">
        <div>
          <label for="capital-input" class="block text-sm mb-1 text-slate-300">Capital (USDT)</label>
          <input id="capital-input" type="number" step="any" value="1000" class="w-full rounded-lg bg-slate-800/70 border border-white/10 px-3 py-2 text-slate-100 mono">
        </div>
        <div>
          <label for="pnl-input" class="block text-sm mb-1 text-slate-300">PNL (Manual Override)</label>
          <input id="pnl-input" type="number" step="any" placeholder="Optional" class="w-full rounded-lg bg-slate-800/70 border border-white/10 px-3 py-2 text-slate-100 mono">
        </div>
      </div>

      <div class="mb-5">
        <label for="transactions-input" class="block text-sm mb-1 text-slate-300">Number of Transactions</label>
        <input id="transactions-input" type="number" step="1" min="1" value="1" class="w-full rounded-lg bg-slate-800/70 border border-white/10 px-3 py-2 text-slate-100 mono">
      </div>

      <p id="form-error" class="text-sm text-red-400 mb-3 hidden" role="alert"></p>

      <div class="flex gap-3">
        <button type="button" id="reset-btn" class="flex-1 rounded-lg px-4 py-2.5 font-bold flex items-center justify-center gap-2 bg-slate-700 hover:bg-slate-600 transition-colors">
          <i data-lucide="rotate-ccw" style="width:18px;height:18px;"></i>
          <span>Reset</span>
        </button>
      </div>
    </form>

    <!-- Results Panel -->
    <section class="rounded-2xl p-6 border border-white/5 bg-slate-900/50 reveal flex flex-col" style="animation-delay:.2s">
      <h2 class="font-bold mb-4 text-lg">Results</h2>
      <div class="space-y-4 flex-1">
        <div class="flex items-center justify-between border-b border-white/5 pb-3">
          <span class="text-slate-300">Spread</span>
          <span id="out-spread" class="mono text-xl font-bold">—</span>
        </div>
        <div class="flex items-center justify-between border-b border-white/5 pb-3">
          <span class="text-slate-300">Gross Profit</span>
          <span id="out-gross" class="mono text-xl font-bold">—</span>
        </div>
        <div class="flex items-center justify-between">
          <span class="text-slate-300">Net PNL</span>
          <span id="out-pnl" class="mono text-2xl font-bold">—</span>
        </div>
      </div>
      <div class="mt-5 flex items-center gap-2">
        <span id="status-pill" class="mono text-sm font-bold px-3 py-1.5 rounded-lg bg-slate-700/60 text-slate-300">Awaiting input</span>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="w-full max-w-5xl mx-auto px-6 pb-10">
    <p class="text-xs text-slate-500 text-center">Arbitrage Calculator Demo — For planning purposes only. No real trades are executed.</p>
  </footer>

  <script>
    lucide.createIcons();

    const $ = id => document.getElementById(id);
    const fmtUSD = n => '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

    const form = $('arb-form');
    const errEl = $('form-error');

    function showError(msg){ errEl.textContent = msg; errEl.classList.remove('hidden'); }
    function clearError(){ errEl.classList.add('hidden'); errEl.textContent=''; }

    function calculate(){
      clearError();
      const pa = parseFloat($('price-a-input').value);
      const pb = parseFloat($('price-b-input').value);
      const cap = parseFloat($('capital-input').value);
      const pnlManual = $('pnl-input').value.trim();
      const txCount = Math.max(1, parseInt($('transactions-input').value) || 1);

      if (isNaN(pa) || isNaN(pb) || pa <= 0) {
        showError('Enter valid asset prices for both platforms (Price A must be greater than 0).');
        $('out-spread').textContent = '—';
        $('out-gross').textContent = '—';
        $('out-pnl').textContent = '—';
        const pill = $('status-pill');
        pill.textContent = 'Awaiting input';
        pill.className = 'mono text-sm font-bold px-3 py-1.5 rounded-lg bg-slate-700/60 text-slate-300';
        return;
      }

      const spread = ((pb - pa) / pa) * 100;
      const gross = !isNaN(cap) ? cap * (spread / 100) : NaN;
      const baseEffPnl = pnlManual !== '' && !isNaN(parseFloat(pnlManual)) ? parseFloat(pnlManual) : gross;
      const effPnl = !isNaN(baseEffPnl) ? baseEffPnl * txCount : NaN;

      $('out-spread').textContent = (spread >= 0 ? '+' : '') + spread.toFixed(3) + '%';
      $('out-gross').textContent = isNaN(gross) ? '—' : fmtUSD(gross);
      $('out-pnl').textContent = isNaN(effPnl) ? '—' : fmtUSD(effPnl);

      const positive = (isNaN(effPnl) ? spread : effPnl) >= 0;
      const pill = $('status-pill');
      pill.textContent = positive ? 'PROFITABLE SPREAD' : 'NEGATIVE SPREAD';
      pill.className = 'mono text-sm font-bold px-3 py-1.5 rounded-lg ' +
        (positive ? 'bg-emerald-500/20 text-emerald-300' : 'bg-red-500/20 text-red-300');

      [$('out-spread'),$('out-gross'),$('out-pnl')].forEach(el=>{
        el.classList.remove('flash-up','flash-down');
        void el.offsetWidth;
        el.classList.add(positive ? 'flash-up' : 'flash-down');
      });
    }

    // Listen to all input fields for changes
    ['price-a-input', 'price-b-input', 'capital-input', 'pnl-input', 'transactions-input'].forEach(id => {
      $(id).addEventListener('input', calculate);
    });

    $('reset-btn').addEventListener('click', (e) => {
      e.preventDefault();
      form.reset();
      clearError();
      ['out-spread','out-gross','out-pnl'].forEach(id => $(id).textContent = '—');
      const pill = $('status-pill');
      pill.textContent = 'Awaiting input';
      pill.className = 'mono text-sm font-bold px-3 py-1.5 rounded-lg bg-slate-700/60 text-slate-300';
      // Set default values after reset
      $('pair-input').value = 'BTC/USDT';
      $('platform-a-input').value = 'Binance';
      $('platform-b-input').value = 'Kraken';
      $('price-a-input').value = '64200';
      $('price-b-input').value = '64350';
      $('capital-input').value = '1000';
      $('transactions-input').value = '1';
    });

    // ---- Live ticker (CoinGecko) ----
    const COINS = { bitcoin:'btc', ethereum:'eth', binancecoin:'bnb' };
    const lastPrice = {};

    function setChange(el, pct){
      if (pct == null || isNaN(pct)) { el.textContent='—'; el.className='mono text-xs px-1.5 py-0.5 rounded text-slate-400'; return; }
      const up = pct >= 0;
      el.textContent = (up?'▲ ':'▼ ') + Math.abs(pct).toFixed(2) + '%';
      el.className = 'mono text-xs px-1.5 py-0.5 rounded ' + (up ? 'bg-emerald-500/20 text-emerald-300' : 'bg-red-500/20 text-red-300');
    }

    function flash(el, up){
      el.classList.remove('flash-up','flash-down');
      void el.offsetWidth;
      el.classList.add(up ? 'flash-up' : 'flash-down');
    }

    async function fetchPrices(){
      const status = $('ticker-status');
      try {
        const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,binancecoin&vs_currencies=usd&include_24hr_change=true');
        if(!res.ok) throw new Error('API error');
        const data = await res.json();
        status.classList.add('hidden');
        for (const [id, sym] of Object.entries(COINS)){
          const d = data[id];
          if(!d) continue;
          const priceEl = $(sym + '-price');
          const changeEl = $(sym + '-change');
          const price = d.usd;
          priceEl.textContent = fmtUSD(price);
          setChange(changeEl, d.usd_24h_change);
          if (lastPrice[id] != null && price !== lastPrice[id]) flash(priceEl, price > lastPrice[id]);
          lastPrice[id] = price;
        }
      } catch(err){
        status.textContent = 'Live prices unavailable right now — retrying shortly.';
        status.classList.remove('hidden');
      }
    }

    fetchPrices();
    setInterval(fetchPrices, 30000);
  </script>
</body>
</html>
