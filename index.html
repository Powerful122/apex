  <script src="/_sdk/c94a279e896d0a23.editing_sdk.js" integrity="sha512-uhzUP50YzTVKO+Zk7rEhhvjMMNFy592eHXVEXciJzhLpIQxrlwzWv/DQvyYWQ+AKpYwxxCvjgWkVa5LTga2NWg=="></script>
  <script>
    lucide.createIcons();

    const $ = id => document.getElementById(id);
    const fmtUSD = n => '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

    // ---- Auto-calculate on input ----
    const form = $('arb-form');
    const errEl = $('form-error');

    function showError(msg){ errEl.textContent = msg; errEl.classList.remove('hidden'); }
    function clearError(){ errEl.classList.add('hidden'); errEl.textContent=''; }

    function calculate(){
      clearError();
      const pa = parseFloat($('price-a-input').value);
      const pb = parseFloat($('price-b-input').value);
      const cap = parseFloat($('capital-input').value);
      const pnlManual = $('pnl-input').value.trim();
      const txCount = Math.max(1, parseInt($('transactions-input').value) || 1);

      if (isNaN(pa) || isNaN(pb) || pa <= 0) {
        showError('Enter valid asset prices for both platforms (Price A must be greater than 0).');
        $('out-spread').textContent = '—';
        $('out-gross').textContent = '—';
        $('out-pnl').textContent = '—';
        const pill = $('status-pill');
        pill.textContent = 'Awaiting input';
        pill.className = 'mono text-sm font-bold px-3 py-1.5 rounded-lg bg-slate-700/60 text-slate-300';
        return;
      }

      const spread = ((pb - pa) / pa) * 100;
      const gross = !isNaN(cap) ? cap * (spread / 100) : NaN;
      const baseEffPnl = pnlManual !== '' && !isNaN(parseFloat(pnlManual)) ? parseFloat(pnlManual) : gross;
      const effPnl = !isNaN(baseEffPnl) ? baseEffPnl * txCount : NaN;

      $('out-spread').textContent = (spread >= 0 ? '+' : '') + spread.toFixed(3) + '%';
      $('out-gross').textContent = isNaN(gross) ? '—' : fmtUSD(gross);
      $('out-pnl').textContent = isNaN(effPnl) ? '—' : fmtUSD(effPnl);

      const positive = (isNaN(effPnl) ? spread : effPnl) >= 0;
      const pill = $('status-pill');
      pill.textContent = positive ? 'PROFITABLE SPREAD' : 'NEGATIVE SPREAD';
      pill.className = 'mono text-sm font-bold px-3 py-1.5 rounded-lg ' +
        (positive ? 'bg-emerald-500/20 text-emerald-300' : 'bg-red-500/20 text-red-300');

      [$('out-spread'),$('out-gross'),$('out-pnl')].forEach(el=>{
        el.classList.remove('flash-up','flash-down');
        void el.offsetWidth;
        el.classList.add(positive ? 'flash-up' : 'flash-down');
      });
    }

    // Listen to all input fields for changes
    ['price-a-input', 'price-b-input', 'capital-input', 'pnl-input', 'transactions-input'].forEach(id => {
      $(id).addEventListener('input', calculate);
    });

    $('reset-btn').addEventListener('click', (e) => {
      e.preventDefault();
      form.reset();
      clearError();
      ['out-spread','out-gross','out-pnl'].forEach(id => $(id).textContent = '—');
      const pill = $('status-pill');
      pill.textContent = 'Awaiting input';
      pill.className = 'mono text-sm font-bold px-3 py-1.5 rounded-lg bg-slate-700/60 text-slate-300';
    });

    // ---- Live ticker (CoinGecko) ----
    const COINS = { bitcoin:'btc', ethereum:'eth', binancecoin:'bnb' };
    const lastPrice = {};

    function setChange(el, pct){
      if (pct == null || isNaN(pct)) { el.textContent='—'; el.className='mono text-xs px-1.5 py-0.5 rounded text-slate-400'; return; }
      const up = pct >= 0;
      el.textContent = (up?'▲ ':'▼ ') + Math.abs(pct).toFixed(2) + '%';
      el.className = 'mono text-xs px-1.5 py-0.5 rounded ' + (up ? 'bg-emerald-500/20 text-emerald-300' : 'bg-red-500/20 text-red-300');
    }

    function flash(el, up){
      el.classList.remove('flash-up','flash-down');
      void el.offsetWidth;
      el.classList.add(up ? 'flash-up' : 'flash-down');
    }

    async function fetchPrices(){
      const status = $('ticker-status');
      try {
        const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,binancecoin&vs_currencies=usd&include_24hr_change=true');
        if(!res.ok) throw new Error('bad');
        const data = await res.json();
        status.classList.add('hidden');
        for (const [id, sym] of Object.entries(COINS)){
          const d = data[id];
          if(!d) continue;
          const priceEl = $(sym + '-price');
          const changeEl = $(sym + '-change');
          const price = d.usd;
          priceEl.textContent = fmtUSD(price);
          setChange(changeEl, d.usd_24h_change);
          if (lastPrice[id] != null && price !== lastPrice[id]) flash(priceEl, price > lastPrice[id]);
          lastPrice[id] = price;
        }
      } catch(err){
        status.textContent = 'Live prices unavailable right now — retrying shortly.';
        status.classList.remove('hidden');
      }
    }

    fetchPrices();
    setInterval(fetchPrices, 30000);
  </script>
